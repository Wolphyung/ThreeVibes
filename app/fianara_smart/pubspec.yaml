name: fianara_smart_city
description: Application Smart City pour Fianarantsoa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^14.0.0
  
  # Network & Data
  http: ^1.1.0
  http_parser: ^4.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.0
  
  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Image
  image_picker: ^1.0.7
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  
  # Local Storage & Charts
  hive_flutter: ^1.1.0
  fl_chart: ^1.2.0
  
  # Real-time & Notifications
  socket_io_client: ^3.0.0
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  # Assets (décommentez quand vous ajoutez des fichiers)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/
  #   - assets/fonts/
  
  # Polices personnalisées (optionnel)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700